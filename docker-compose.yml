services:
  ollama:
    build:
      context: docker
      dockerfile: ollama/Dockerfile
    image: deepseektree-ollama:latest
    container_name: deepseektree-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # llama.cpp needs more than Docker's default 64MB /dev/shm or the process is SIGKILL'd.
    shm_size: "2gb"
    environment:
      # Registry pulls may need the company proxy; use host.docker.internal on Windows Docker.
      HTTP_PROXY: ${PROXY:-}
      HTTPS_PROXY: ${PROXY:-}
      http_proxy: ${PROXY:-}
      https_proxy: ${PROXY:-}
      NO_PROXY: localhost,127.0.0.1,ollama,api
      no_proxy: localhost,127.0.0.1,ollama,api
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_KEEP_ALIVE: "10m"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Uncomment for NVIDIA GPU (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  init-model:
    image: deepseektree-ollama:latest
    container_name: deepseektree-init-model
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - ollama pull deepseek-r1:7b
    restart: "no"

  api:
    build:
      context: .
      args:
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
        http_proxy: ""
        https_proxy: ""
        ALL_PROXY: ""
        NO_PROXY: "*"
    container_name: deepseektree-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      ALL_PROXY: ""
      NO_PROXY: "*"
      no_proxy: "*"
      OLLAMA_URL: http://ollama:11434/v1/chat/completions
      OLLAMA_OPENAI_BASE_URL: http://ollama:11434/v1
      LLM_PROVIDER: ollama
      AI_MODEL: deepseek-r1:7b
      CHAT_MODEL: deepseek-r1:7b
      REPORT_MODEL: deepseek-r1:7b
      API_BASE_URL: http://127.0.0.1:8000
      VERIFY_SSL: "false"
    depends_on:
      init-model:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  ollama_data:
