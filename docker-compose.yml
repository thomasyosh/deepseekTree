services:
  ollama:
    image: ollama/ollama:latest
    container_name: deepseektree-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    # Uncomment for NVIDIA GPU (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  init-model:
    image: ollama/ollama:latest
    container_name: deepseektree-init-model
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - ollama pull deepseek-r1:7b
    restart: "no"

  api:
    build: .
    container_name: deepseektree-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OLLAMA_URL: http://ollama:11434/v1/chat/completions
      AI_MODEL: deepseek-r1:7b
      CHAT_MODEL: deepseek-r1:7b
      REPORT_MODEL: deepseek-r1:7b
      API_BASE_URL: http://127.0.0.1:8000
      PROXY: ""
    depends_on:
      init-model:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  ollama_data:
